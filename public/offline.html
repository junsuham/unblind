<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#fc5230" />
    <title>연결 확인 | 언블라인드</title>
    <style>
      * { box-sizing: border-box; }
      html, body { min-height: 100%; margin: 0; }
      body { display: grid; place-items: center; padding: calc(24px + env(safe-area-inset-top)) 20px calc(24px + env(safe-area-inset-bottom)); background: #fc5230; color: #111; font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif; }
      main { width: min(100%, 390px); border-radius: 28px; background: rgba(255,255,255,.94); padding: 28px; box-shadow: 0 18px 48px rgba(0,0,0,.16); text-align: center; }
      img { width: 76px; height: 76px; border-radius: 18px; }
      h1 { margin: 18px 0 8px; font-size: 24px; line-height: 1.3; }
      p { margin: 0; color: rgba(60,60,67,.72); font-size: 16px; line-height: 1.55; }
      button { width: 100%; min-height: 50px; margin-top: 22px; border: 0; border-radius: 15px; background: #fc5230; color: #fff; font: inherit; font-weight: 700; }
    </style>
  </head>
  <body>
    <main>
      <img src="/icons/icon-192-v5.png" alt="언블라인드" />
      <h1>인터넷 연결을 확인해주세요</h1>
      <p>언블라인드는 개인정보 보호를 위해 게시물과 계정 정보를 기기에 저장하지 않습니다. 연결이 복구되면 다시 이용할 수 있습니다.</p>
      <button type="button" onclick="location.reload()">다시 연결</button>
    </main>
  </body>
</html>
