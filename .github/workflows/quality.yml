name: Quality gate

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_SITE_URL: https://example.com
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ci-publishable-key
      SUPABASE_SECRET_KEY: ci-secret-key
      ADMIN_EMAILS: admin@example.com
      ADMIN_PASSWORD: ci-password-at-least-24-characters
      ADMIN_SESSION_TOKEN: ci-session-token-at-least-24-characters
      CRON_SECRET: ci-cron-secret-at-least-24-characters
      EXPO_PUBLIC_SUPABASE_URL: https://example.supabase.co
      EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ci-publishable-key
      EXPO_PUBLIC_WEB_API_URL: https://example.com
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            mobile/package-lock.json
      - run: npm ci
      - run: npm ci --prefix mobile
      - run: npm run check
      - run: npm run check:mobile
